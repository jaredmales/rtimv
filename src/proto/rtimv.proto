syntax="proto3";

package remote_rtimv;

service rtimv
{
    rpc Configure(Config) returns (ConfigResult);

    rpc ImagePlease(ImageRequest) returns (Image);

    rpc ColorBox(Box) returns (Image);

    rpc GetPixel(Coord) returns(Pixel);

    rpc StatsBox(Box) returns(Pixel);
}

message Config
{
    string file = 1;
    string imageKey = 2;
    string darkKey = 3;
    string maskKey = 4;
    string satMaskKey = 5;
    float updateFPS = 6;
    uint32 updateTimeout = 7;
    float updateCubeFPS = 8;
    bool autoscale = 9;
    bool darksub = 10;
    float satLevel = 11;
    bool masksat = 12;
    bool mzmqAlways = 13;
    string mzmqServer = 14;
    uint32 mzmqPort = 15;
}

message ConfigResult
{
    int32 result = 1;
}

message ImageRequest
{
}

enum ImageStatus
{
    IMAGE_STATUS_VALID = 0;
    IMAGE_STATUS_NO_IMAGE = 1;
    IMAGE_STATUS_TIMEOUT = 2;
    IMAGE_STATUS_NOT_CONFIGURED = 3;
    IMAGE_STATUS_ERROR = 4;
}

message Image
{
    ImageStatus status = 1;
    double atime = 2;
    double fps = 3;
    bytes image = 4;
}

message Coord
{
    uint32 x = 1;
    uint32 y = 2;
}

message Pixel
{
    float value = 1;
}

message Box
{
    Coord upperLeft = 1;
    Coord lowerRight = 2;
}
